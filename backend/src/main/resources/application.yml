spring:
  application:
    name: pixierge-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pixierge}
    username: ${SPRING_DATASOURCE_USERNAME:pixierge}
    password: ${SPRING_DATASOURCE_PASSWORD:pixierge}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
