services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pixierge}
      POSTGRES_USER: ${POSTGRES_USER:-pixierge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixierge}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pixierge} -d ${POSTGRES_DB:-pixierge}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/pixierge}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-pixierge}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-pixierge}
      PIXIERGE_BACKGROUND_JOBS_MAX_CONCURRENT_JOBS: ${PIXIERGE_BACKGROUND_JOBS_MAX_CONCURRENT_JOBS:-2}
      PIXIERGE_BACKGROUND_JOBS_IDENTITY_BATCH_SIZE: ${PIXIERGE_BACKGROUND_JOBS_IDENTITY_BATCH_SIZE:-100}
      PIXIERGE_BACKGROUND_JOBS_CLAIM_BATCH_SIZE: ${PIXIERGE_BACKGROUND_JOBS_CLAIM_BATCH_SIZE:-25}
      PIXIERGE_BACKGROUND_JOBS_POLL_INTERVAL_MS: ${PIXIERGE_BACKGROUND_JOBS_POLL_INTERVAL_MS:-2000}
      PIXIERGE_STORAGE_ROOT: /var/lib/pixierge
    ports:
      - "8080:8080"
    volumes:
      - pixierge-storage:/var/lib/pixierge
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://api:8080}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
  pixierge-storage:
